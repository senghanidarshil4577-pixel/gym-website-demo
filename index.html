<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitZone Gym Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#0b1220;color:#fff}
header{display:flex;justify-content:space-between;padding:15px 30px;background:#020617}
nav a{color:#fff;margin-left:20px;text-decoration:none}
.hero{height:90vh;background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1');background-size:cover;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:48px}
.btn{background:#22c55e;padding:12px 25px;border-radius:30px;text-decoration:none;color:#fff;margin-top:20px;cursor:pointer}
.section{padding:60px 20px;text-align:center}
.cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.card{background:#111827;padding:20px;border-radius:10px;width:260px}
.plan{border:2px solid #22c55e}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;padding:15px;border-radius:50%}
form input,form select{width:100%;padding:10px;margin:10px 0;border:none;border-radius:5px}
form button{background:#22c55e;color:#fff;padding:10px;border:none;border-radius:5px}
</style></head><body>
<header>
<h2>FitZone Gym</h2>
<nav>
<a href="#">Home</a>
<a href="#plans">Plans</a>
<a href="#join">Join</a>
</nav>
</header><section class="hero">
<h1>Transform Your Body</h1>
<p>Join the best gym today</p>
<a href="#plans" class="btn">Join Now</a>
</section><section class="section" id="plans">
<h2>Membership Plans</h2>
<div class="cards">
<div class="card plan">
<h3>Basic</h3>
<p>₹999/month</p>
<p>✔ Gym Access
✔ Free Diet Plan</p>
</div>
<div class="card plan">
<h3>Pro</h3>
<p>₹1999/month</p>
<p>✔ Personal Trainer
✔ Supplements Guide</p>
</div>
<div class="card plan">
<h3>Premium</h3>
<p>₹2999/month</p>
<p>✔ All Access
✔ 24/7 Support</p>
</div>
</div>
</section><section class="section" id="join">
<h2>Join Now</h2>
<form onsubmit="sendData(event)">
<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Mobile Number" required>
<select id="plan">
<option>Basic</option>
<option>Pro</option>
<option>Premium</option>
</select>
<select id="payment">
<option>Online Payment</option>
<option>Offline Payment</option>
</select>
<button type="submit">Submit</button>
</form>
</section><section class="section" id="receipt" style="display:none">
<h2>Receipt</h2>
<p id="receiptData"></p>
</section><a href="https://wa.me/919876543210" class="whatsapp">💬</a>

<script>
function sendData(e){
e.preventDefault();
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let plan=document.getElementById('plan').value;
let payment=document.getElementById('payment').value;

// Email (mailto simulation)
window.location.href=`mailto:admin@gmail.com?subject=New Gym Member&body=Name:${name}%0APhone:${phone}%0APlan:${plan}%0APayment:${payment}`;

// Receipt
let receipt=`Name: ${name} <br> Phone: ${phone} <br> Plan: ${plan} <br> Payment: ${payment}`;
document.getElementById('receiptData').innerHTML=receipt;
document.getElementById('receipt').style.display='block';
}
</script></body>
</html>
